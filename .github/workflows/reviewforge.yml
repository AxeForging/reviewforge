name: ReviewForge

on:
  workflow_call:
    inputs:
      ai_provider:
        description: 'AI provider: openai, anthropic, gemini'
        type: string
        default: 'openai'
      ai_model:
        description: 'AI model to use'
        type: string
        default: 'gpt-4'
      persona:
        description: 'Reviewer persona: bob, robert, maya, eli'
        type: string
        default: ''
      language:
        description: 'Review language (e.g. pt-br, es, fr)'
        type: string
        default: ''
      max_comments:
        description: 'Maximum line comments (0 = unlimited)'
        type: string
        default: '25'
      exclude_patterns:
        description: 'Comma-separated glob patterns to exclude'
        type: string
        default: '**/*.lock,**/*.json,**/*.md'
      context_files:
        description: 'Comma-separated files to include as AI context'
        type: string
        default: 'package.json,README.md'
      project_context:
        description: 'Additional context about the project'
        type: string
        default: ''
      approve_reviews:
        description: 'Allow approve/request changes verdicts'
        type: string
        default: 'true'
      incremental:
        description: 'Only review new changes since last bot review'
        type: string
        default: 'true'
      strict_changes:
        description: 'Only request changes for syntax errors or degradation'
        type: string
        default: 'false'
    secrets:
      ai_api_key:
        required: true
      github_token:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: AxeForging/reviewforge@v1
        with:
          GITHUB_TOKEN: ${{ secrets.github_token }}
          AI_PROVIDER: ${{ inputs.ai_provider }}
          AI_MODEL: ${{ inputs.ai_model }}
          AI_API_KEY: ${{ secrets.ai_api_key }}
          PERSONA: ${{ inputs.persona }}
          LANGUAGE: ${{ inputs.language }}
          MAX_COMMENTS: ${{ inputs.max_comments }}
          EXCLUDE_PATTERNS: ${{ inputs.exclude_patterns }}
          CONTEXT_FILES: ${{ inputs.context_files }}
          PROJECT_CONTEXT: ${{ inputs.project_context }}
          APPROVE_REVIEWS: ${{ inputs.approve_reviews }}
          INCREMENTAL: ${{ inputs.incremental }}
          STRICT_CHANGES: ${{ inputs.strict_changes }}
